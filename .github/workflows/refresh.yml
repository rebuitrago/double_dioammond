name: Refresh data and rescore

# Runs weekly (and on demand). Pulls WDI/WGI into Supabase, then computes a
# fresh scoring run. Secrets are set in the repo: Settings -> Secrets and
# variables -> Actions.
on:
  schedule:
    - cron: "0 6 * * 1"     # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      normalization:
        description: "within_year or pooled"
        default: "pooled"

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Ingest WDI/WGI
        run: python -m ddd.ingest --start 2010
      - name: Score run
        run: |
          python -m ddd.score_run \
            --label "auto $(date +%F)" \
            --normalization "${{ github.event.inputs.normalization || 'pooled' }}" \
            --vintage "WDI $(date +%Y-%m)"
